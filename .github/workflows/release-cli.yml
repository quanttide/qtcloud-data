name: release-cli

on:
  push:
    tags:
      - "cli/v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Patch path deps to git deps
        run: |
          # Path deps don't work in CI. Replace with git deps.
          # Note: git deps require Cargo.toml at repo root, not in subdirectory.
          # As a workaround, clone the deps into the expected relative path.
          # path = "../../../../packages/..." from src/cli/
          # In CI runner: checkout = /home/runner/work/qtcloud-data/qtcloud-data
          # ../../../../ from src/cli = /home/runner/work/packages/
          mkdir -p /home/runner/work/packages
          git clone --depth 1 https://github.com/quanttide/quanttide-agent-toolkit.git /home/runner/work/packages/quanttide-agent-toolkit
          git clone --depth 1 https://github.com/quanttide/quanttide-data-toolkit.git /home/runner/work/packages/quanttide-data-toolkit
          # Verify
          ls /home/runner/work/packages/quanttide-agent-toolkit/packages/rust/Cargo.toml
          ls /home/runner/work/packages/quanttide-data-toolkit/packages/rust/Cargo.toml

      - name: Build
        run: cargo build --release
        working-directory: src/cli

      - name: Package
        run: |
          cd target/release
          tar czf ../../qtcloud-data-x86_64-linux.tar.gz qtcloud-data

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: qtcloud-data-x86_64-linux.tar.gz
