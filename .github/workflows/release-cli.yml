name: release-cli

on:
  push:
    tags:
      - "cli/v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clone dependency repos
        run: |
          mkdir -p /home/runner/work/packages
          git clone --depth 1 https://github.com/quanttide/quanttide-agent-toolkit.git /home/runner/work/packages/quanttide-agent-toolkit 2>&1
          git clone --depth 1 https://github.com/quanttide/quanttide-data-toolkit.git /home/runner/work/packages/quanttide-data-toolkit 2>&1
          echo "=== verifying ==="
          find /home/runner/work/packages -name "Cargo.toml" -maxdepth 4

      - name: Build
        run: cargo build --release
        working-directory: src/cli

      - name: Package
        run: |
          cd target/release
          tar czf ../../qtcloud-data-x86_64-linux.tar.gz qtcloud-data

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: qtcloud-data-x86_64-linux.tar.gz
