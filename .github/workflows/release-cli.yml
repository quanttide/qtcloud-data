name: release-cli

on:
  push:
    tags:
      - "cli/v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup dependencies
        run: |
          # Create the expected parent directory structure for path deps
          # path = "../../../../packages/..." from src/cli/ means:
          #   .. = src/, ../.. = repo root, ../../.. = parent, ../../../.. = grandparent
          GRANDPARENT=$(cd .. && pwd)/..
          mkdir -p "$GRANDPARENT/packages"
          cd "$GRANDPARENT/packages"
          git clone https://github.com/quanttide/quanttide-agent-toolkit.git --depth 1
          git clone https://github.com/quanttide/quanttide-data-toolkit.git --depth 1
        shell: bash

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: src/cli

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../qtcloud-data-${{ matrix.target }}.tar.gz qtcloud-data

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../qtcloud-data-${{ matrix.target }}.zip qtcloud-data.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            qtcloud-data-*.tar.gz
            qtcloud-data-*.zip
